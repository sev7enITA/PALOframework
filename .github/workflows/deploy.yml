name: Validate and deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install toolchain
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Install checksum-verified OPA
        run: npm run opa:install

      - name: Validate agentic contracts, policy, runtime, protocol, and connectors
        run: npm run validate:agentic

      - name: Validate authoring source
        run: npm run validate

      - name: Build allowlisted publication artifact
        run: npm run build

      - name: Validate publication artifact
        run: npm run validate:dist

      - name: Verify deterministic dist
        run: npm run build:check

      - name: Browser smoke
        run: npm run smoke

      - name: Setup Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload dist only
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy dist to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
