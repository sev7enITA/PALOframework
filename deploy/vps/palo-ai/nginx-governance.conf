server {
    listen 80;
    listen [::]:80;
    server_name governance.paloframework.org;

    access_log /var/log/nginx/palo-ai-access.log;
    error_log /var/log/nginx/palo-ai-error.log warn;
    client_max_body_size 1m;

    location = /mcp-health {
        proxy_pass http://127.0.0.1:18878/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /mcp {
        proxy_pass http://127.0.0.1:18878/mcp;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /gateway/v1/approvals/resolve {
        return 404;
    }

    location ~ ^/gateway/(health|v1/registry|v1/actions/verify|v1/approvals/[^/]+|v1/evidence/verify-ledger)$ {
        rewrite ^/gateway(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:18877;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }

    location /gateway/ {
        return 404;
    }

    location / {
        return 404;
    }
}
